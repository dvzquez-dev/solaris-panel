<meta charset="utf-8">
<script src="https://accounts.google.com/gsi/client" async></script>
<title>Solaris</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0D0A0B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Solaris">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

<style>
  /* Prototipo de la app del miembro. Tema oscuro comprometido: una app de
     equipo aeroespacial, estética «control de misión de noche». No es una
     omisión del modo claro, es el mundo visual elegido. */
  :root{
    --bg:#0D0A0B; --sur:#161112; --sur2:#1F1819; --line:#33292A;
    --ink:#F4EEEE; --ink2:#B0A2A1; --ink3:#7A6B6A;
    --red:#E41E25; --red2:#FF4A4F;          /* rojo Solaris, de la insignia */
    --ok:#3EB489; --okbg:#10241C;
    --info:#C8BEBB; --bad:#E4342B; --badbg:#2A1414;
    --warn:#E8912E;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;overscroll-behavior:none}   /* evita el "tirar para refrescar" accidental */
  body{
    background:
      radial-gradient(1100px 660px at 50% -10%, #2C1012 0%, transparent 62%),
      var(--bg);
    min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,sans-serif;
    color:var(--ink); line-height:1.45;
    display:grid; place-items:start center; padding:22px 14px 40px;
  }
  .mono{font-variant-numeric:tabular-nums;
    font-family:ui-monospace,"SF Mono","Cascadia Mono",Consolas,monospace}

  /* ── marco de teléfono ─────────────────────────────────────────────── */
  .fono{
    width:100%; max-width:400px; height:812px; max-height:calc(100vh - 62px); position:relative;
    background:var(--bg); border:1px solid var(--line); border-radius:34px;
    box-shadow:0 30px 80px -20px rgba(0,0,0,.7), inset 0 0 0 1px rgba(255,255,255,.02);
    overflow:hidden; display:flex; flex-direction:column;
  }
  @media(max-width:430px){ body{padding:0} .fono{border:0;border-radius:0;height:100vh;height:100dvh;max-height:none} }

  /* ── cabecera ──────────────────────────────────────────────────────── */
  header{
    position:sticky; top:0; z-index:20; padding:calc(15px + env(safe-area-inset-top)) 18px 14px;
    background:linear-gradient(180deg, var(--bg) 76%, transparent);
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  header::after{content:""; position:absolute; left:18px; right:18px; bottom:5px;
    height:1px; background:linear-gradient(90deg,transparent,var(--line) 22%,
      var(--line) 78%,transparent)}
  .brand{display:flex; align-items:center; gap:10px; flex:none}
  .brand .ins{height:35px; width:auto; display:block}
  .brand .wm{height:27px; width:auto; display:block}
  .quien{
    display:flex; align-items:center; gap:4px; padding:5px 9px 5px 5px;
    background:var(--sur); border:1px solid var(--line); border-radius:22px;
    cursor:pointer; position:relative; flex:none;
  }
  .avat{width:29px;height:29px;border-radius:50%;display:grid;place-items:center;
    font-size:13px;font-weight:700;color:#1a0d0d;background:var(--red)}
  .quien svg{width:14px;height:14px;color:var(--ink3)}
  select#persona{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:16px}

  /* ── contenido con scroll ──────────────────────────────────────────── */
  main{flex:1; min-height:0; overscroll-behavior:contain; overflow-y:auto; padding:4px 16px 14px; -webkit-overflow-scrolling:touch;
    position:relative; z-index:1}
  /* estrellas de 4 puntas de fondo — el motivo de la insignia, muy tenue */
  .deco{position:absolute; top:0; left:0; right:0; height:340px; z-index:0;
    pointer-events:none; overflow:hidden}
  .deco svg{position:absolute}
  .marcagua{position:absolute; bottom:66px; right:-40px; width:210px; height:auto;
    opacity:.045; z-index:0; pointer-events:none}
  .pantalla{display:none; animation:sube .32s ease}
  .pantalla.on{display:block}
  @keyframes sube{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  h1{font-size:22px;font-weight:700;letter-spacing:-.02em;margin:6px 0 2px}
  .sub{color:var(--ink2);font-size:13px;margin:0 0 16px}
  h2{font-size:11px;text-transform:uppercase;letter-spacing:.13em;color:var(--ink3);
    font-weight:700;margin:22px 2px 10px}

  .tarjeta{background:var(--sur);border:1px solid var(--line);border-radius:16px;
    padding:16px;margin-bottom:11px; box-shadow:inset 0 1px 0 rgba(255,255,255,.025)}
  .tarjeta.acc{background:linear-gradient(160deg,#251113,#17100f);
    border-color:#3d1a1c}

  /* ── home: anillo de puntos ────────────────────────────────────────── */
  .cabhome{display:flex;align-items:center;gap:18px;margin:12px 0 8px}
  .gauge{position:relative;width:104px;height:104px;flex:none}
  .gval{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;font-weight:800;font-size:36px;
    letter-spacing:-.03em;line-height:.8}
  .gval span{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.03em;
    margin-top:4px}
  .hola{font-size:13px;color:var(--ink2)}
  .hola b{display:block;font-size:26px;color:var(--ink);font-weight:700;
    letter-spacing:-.02em;margin-top:1px}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;
    font-weight:600;padding:3px 9px;border-radius:20px;margin-top:6px}
  .pill.ev{background:var(--badbg);color:var(--bad)}
  .pill.no{background:#241b1c;color:var(--info)}
  .pill.el{background:var(--okbg);color:var(--ok)}

  .alerta{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;
    border-radius:13px;margin-bottom:9px;font-size:13px}
  .alerta.mal{background:var(--badbg);border:1px solid #46201c;color:#f0b8b0}
  .alerta.avi{background:#2a2110;border:1px solid #4a3a18;color:#f0d8a8}
  .alerta b{color:#fff}
  .alerta .ic{flex:none;width:18px;height:18px;margin-top:1px}
  .alerta.clic{cursor:pointer}
  .alerta .chev{margin-left:auto;align-self:center;font-size:18px;opacity:.6}

  .cuota{display:flex;align-items:flex-end;justify-content:space-between;gap:10px}
  .cuota .n{font-size:44px;font-weight:800;letter-spacing:-.03em;color:var(--ink);
    line-height:.95}
  .cuota .n small{font-size:20px;font-weight:600}
  .cuota .et{font-size:12px;color:var(--ink2);text-align:right;max-width:120px}
  .palanca{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);
    font-size:12.5px;color:var(--ink2);display:flex;align-items:center;gap:8px}
  .palanca b{color:var(--ok)}
  .palanca.tope b{color:var(--ok)}
  .recibo{margin-top:12px;border-top:1px solid var(--line);padding-top:11px}
  .rl{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;color:var(--ink2);padding:3.5px 0}
  .rl .ra{font-variant-numeric:tabular-nums;color:var(--ink);font-weight:600;white-space:nowrap}
  .rl.desc .ra{color:var(--ok)}
  .rnota{font-size:11.5px;color:var(--ink3);margin-top:7px;line-height:1.45}

  .duo{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .mini .k{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em}
  .mini .v{font-size:24px;font-weight:700;margin-top:3px;letter-spacing:-.02em}
  .mini .v small{font-size:13px;color:var(--ink3);font-weight:600}

  .fila{display:flex;align-items:center;gap:12px;padding:11px 0;
    border-bottom:1px solid var(--line)}
  .fila:last-child{border-bottom:0}
  .fila .tit{flex:1;font-size:14px;font-weight:600}
  .fila .tit small{display:block;color:var(--ink3);font-weight:400;font-size:12px;margin-top:1px}
  .fila .der{text-align:right;font-size:13px;color:var(--ink2);white-space:nowrap}
  .tag{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
    padding:2px 7px;border-radius:6px}
  .tag.imp{background:#2a2011;color:var(--warn)} .tag.urg{background:var(--badbg);color:var(--bad)}
  .tag.nor{background:#241b1c;color:var(--info)} .tag.vol{background:var(--okbg);color:var(--ok)}

  /* barras */
  .barra{height:8px;border-radius:5px;background:var(--sur2);overflow:hidden;margin-top:7px}
  .barra i{display:block;height:100%;border-radius:5px}
  .banda{position:relative;height:30px;margin:14px 0 6px}
  .banda .via{position:absolute;top:11px;left:0;right:0;height:8px;border-radius:5px;
    background:var(--sur2)}
  .banda .sana{position:absolute;top:11px;height:8px;background:#1d3a2b;border-radius:0}
  .banda .yo{position:absolute;top:6px;width:3px;height:18px;background:var(--red);
    border-radius:2px;box-shadow:0 0 8px rgba(228,30,37,.55)}
  .banda .et{position:absolute;top:-2px;font-size:10px;color:var(--ink3)}

  .rank .r{display:flex;align-items:center;gap:10px;padding:8px 0;
    border-bottom:1px solid var(--line);font-size:13px}
  .rank .r:last-child{border-bottom:0}
  .rank .p{width:26px;color:var(--ink3);font-size:12px}
  .rank .cens{flex:1;height:9px;border-radius:5px;
    background:repeating-linear-gradient(90deg,#2c2223 0 7px,#201818 7px 12px)}
  .rank .r.yo{background:linear-gradient(90deg,rgba(228,30,37,.10),transparent);
    margin:0 -8px;padding:8px;border-radius:9px;border-bottom:0}
  .rank .r.yo .nom{flex:1;font-weight:700;color:var(--red2)}
  .rank .r.yo .p{color:var(--red2);font-weight:700}
  .rank .hrs{color:var(--ink3);font-size:12px}

  .ejemplo{font-size:11px;color:var(--ink3);font-style:italic;margin:2px 2px 12px;
    display:flex;align-items:center;gap:6px}
  .ejemplo::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--warn);flex:none}

  /* ── nav inferior ──────────────────────────────────────────────────── */
  nav{position:relative;display:flex;flex:none;z-index:15;
    background:rgba(13,10,11,.88);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);padding:9px 6px calc(9px + env(safe-area-inset-bottom))}
  nav button{position:relative;flex:1;background:none;border:0;color:var(--ink3);
    cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:5px 2px;font-size:9.5px;font-weight:600;letter-spacing:.02em}
  nav button svg{width:22px;height:22px}
  nav button.on{color:var(--red2)}
  nav button.on::before{content:"";position:absolute;top:-9px;left:50%;
    transform:translateX(-50%);width:22px;height:2px;border-radius:0 0 2px 2px;
    background:var(--red);box-shadow:0 0 9px var(--red)}
  nav button:focus-visible{outline:2px solid var(--info);outline-offset:2px;border-radius:8px}
  nav button .navbadge{position:absolute;top:0;left:calc(50% + 4px);min-width:14px;height:14px;padding:0 3px;border-radius:8px;background:var(--red);color:#fff;font-size:9px;font-weight:800;line-height:14px;text-align:center;box-shadow:0 0 0 1.5px rgba(13,10,11,.92);display:none}

  .pie{text-align:center;font-size:10.5px;color:var(--ink3);padding:14px 0 4px}
  .est{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
    padding:2px 7px;border-radius:6px;white-space:nowrap}
  .est.se{background:#241b1c;color:var(--ink3)}
  .est.ed{background:#2a2011;color:var(--warn)}
  .est.rv{background:var(--okbg);color:var(--ok)}
  .est.fin{background:#1e2a20;color:#7ea88c}
  .tk .tit small .venc{color:var(--red2);font-weight:600}
  /* disponibilidad marcada (mapa de calor) */
  .reu{cursor:pointer}
  .reutog{display:flex;align-items:center;justify-content:space-between;
    margin-top:12px;padding-top:12px;border-top:1px solid var(--line);
    font-size:12.5px;font-weight:600;color:var(--red2)}
  .reutog svg{transition:transform .3s}
  .reutog.ab svg{transform:rotate(180deg)}
  .disp-sec{max-height:0;overflow:hidden;transition:max-height .4s ease}
  .disp-sec.on{max-height:460px}
  .pastog{display:flex;align-items:center;justify-content:space-between;cursor:pointer;
    padding:13px 15px;margin-top:10px;border:1px solid var(--line);border-radius:12px;
    background:var(--sur);font-size:13px;font-weight:600;color:var(--red2)}
  .pastog svg{transition:transform .3s}
  .pastog.ab svg{transform:rotate(180deg)}
  .pastog b{color:var(--ink2);font-weight:600}
  .pas-sec{max-height:0;overflow:hidden;transition:max-height .45s ease}
  .pas-sec.on{max-height:2400px}
  .pas-sec .tarjeta{margin-top:8px}
  /* Tareas del equipo (Vista admin): fila de miembro plegable + cajón de tareas */
  .tkm{display:flex;align-items:center;justify-content:space-between;cursor:pointer;
    padding:12px 14px;margin-top:8px;border:1px solid var(--line);border-radius:12px;background:var(--sur)}
  .tkm .tit{font-weight:600}
  .tkm .der{display:flex;align-items:center;gap:8px;color:var(--ink3)}
  .tkm svg{transition:transform .3s}
  .tkm.ab svg{transform:rotate(180deg)}
  .tkn{font-size:12px;font-weight:700;background:var(--sur2);border:1px solid var(--line);
    border-radius:20px;padding:2px 9px;color:var(--ink2);min-width:22px;text-align:center}
  .tkn.z{opacity:.45}
  .tkbox{display:none;padding:0 2px 2px}
  .tkbox.on{display:block}
  /* Cola de sanciones (Panel PD) — tarjeta apilada: nombre+puntos arriba, motivo debajo, acciones al pie */
  .scsec{font-size:12.5px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin:18px 2px 8px}
  .scitem{padding:13px 2px;border-top:1px solid var(--line)}
  .scitem:first-child{border-top:0}
  .scitem-h{display:flex;align-items:baseline;gap:8px}
  .scitem-n{font-weight:700;font-size:15px}
  .scitem-p{font-weight:800;font-size:15px;margin-left:auto;font-variant-numeric:tabular-nums}
  .scitem-m{font-size:12.5px;color:var(--ink2);margin:4px 0 11px;line-height:1.45}
  .scitem-a{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .scitem-a button{border:1px solid var(--line);background:var(--sur);border-radius:9px;padding:7px 15px;font-size:12.5px;font-weight:600;cursor:pointer}
  .scitem-a button:disabled{opacity:.5;cursor:default}
  .scok{color:var(--ok);border-color:var(--ok)!important}
  .scno{color:var(--red2);border-color:var(--red2)!important}
  .scmod{color:var(--ink2)}
  .scitem-wait{font-size:12.5px;color:var(--ink3);font-weight:600}
  /* Lote: varias sanciones que comparten motivo → una tarjeta y un solo comunicado */
  .sclote{background:var(--sur);border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:10px}
  .sclote-h{display:flex;align-items:baseline;justify-content:space-between;gap:10px;font-size:13.5px}
  .sclote-m{font-size:12.5px;color:var(--ink2);margin-top:4px;line-height:1.45}
  .sclote-items{margin-top:2px;border-top:1px solid var(--line);padding-top:2px}
  .sclote .pastog{margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
  .sclote .pas-sec.on{max-height:6000px}   /* un lote puede llevar los 32 del equipo */
  /* Progreso de una tanda de decisiones: fijo al viewport, para que siga viéndose
     aunque la tarjeta se repinte o la cierres. */
  .scprog{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(72px + env(safe-area-inset-bottom));
    z-index:60;background:var(--sur2);border:1px solid var(--line);border-radius:12px;
    padding:9px 15px;box-shadow:0 10px 26px rgba(0,0,0,.45);display:flex;flex-direction:column;
    align-items:center;gap:2px;font-size:13px;color:var(--ink);max-width:88vw;text-align:center}
  .scprog small{color:var(--ink3);font-size:11px}
  /* Selección múltiple de miembros (paquete de sanciones) */
  .scms{max-height:38vh;overflow-y:auto;border:1px solid var(--line);border-radius:9px;background:var(--sur2)}
  .scms label{display:flex;align-items:center;gap:9px;padding:8px 11px;font-size:13.5px;color:var(--ink);cursor:pointer;border-bottom:1px solid var(--line)}
  .scms label:last-child{border-bottom:0}
  .scms input{width:16px;height:16px;flex:none;accent-color:var(--red)}
  .scms small{color:var(--ink3);font-size:11px}
  .scmsbar{display:flex;gap:8px;align-items:center;margin-top:6px;font-size:12px;color:var(--ink3)}
  .scmsbar button{background:none;border:0;color:var(--red2);font-size:12px;font-weight:600;cursor:pointer;padding:0}
  .scpill{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:5px 11px;border-radius:20px}
  .scpill.ok{background:var(--okbg);color:var(--ok)}
  .scpill.no{background:#2a1a1b;color:var(--red2)}
  .scpill{background:var(--sur2);color:var(--ink2)}   /* neutra: revocada / revocación en curso */
  .pasnota{font-size:11.5px;color:var(--ink3);margin:10px 4px 0;line-height:1.45}
  .dispcab{font-size:12.5px;color:var(--ink2);margin:14px 2px 11px}
  .dispcab b{color:var(--ink)}
  .rejwrap{overflow-x:auto;margin:0 2px;padding-bottom:2px}
  .rejilla{display:grid;gap:2px}
  .rc{font-size:8px;color:var(--ink3);display:flex;align-items:center;justify-content:center}
  .rc.rd{justify-content:flex-end;padding-right:6px;white-space:nowrap;font-size:10px;position:sticky;left:0;background:var(--sur);z-index:2}
  .rejilla>.rc:first-child,.egrid>.rc:first-child{position:sticky;left:0;background:var(--sur);z-index:2}
  .rc.rh{overflow:visible;position:relative;min-height:17px;align-items:flex-start}
  .rc.rh span{position:absolute;left:0;top:3px;transform:translateX(-50%);white-space:nowrap;font-size:9px;color:var(--ink2)}
  .rc.rh span.fin{left:auto;right:0;transform:none}
  .rc.rh.cen span{left:50%}
  .cel{height:20px;border-radius:2px}
  .cel.si{background:var(--red)}
  .cel.na{background:#2c2223}
  .cel.no{background:transparent}
  .cel.p{background:var(--red)}
  .cel.t{background:#3f9ed6}
  .displeg{display:flex;flex-wrap:wrap;align-items:center;gap:4px 5px;margin-top:11px;font-size:10.5px;color:var(--ink3)}
  .displeg .pt{width:9px;height:9px;border-radius:2px}
  .displeg .pt.si{background:var(--red)} .displeg .pt.na{background:#2c2223}
  .displeg .pt.no{background:transparent;border:1px solid var(--line)}
  .displeg .pt.p{background:var(--red)} .displeg .pt.t{background:#3f9ed6}
  .sindatos{padding:18px 6px;text-align:center;color:var(--ink2);font-size:13px}
  .sindatos span{display:block;color:var(--ink3);font-size:11.5px;margin-top:5px}
  .clicable{cursor:pointer}
  .chev{color:var(--ink3);font-weight:700;margin-left:2px}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;z-index:60;align-items:flex-end;justify-content:center}
  .modal.on{display:flex}
  .modal-card{background:var(--sur);border:1px solid var(--line);border-radius:16px 16px 0 0;width:100%;max-width:440px;max-height:86vh;overflow-y:auto;padding:22px 18px 30px;position:relative}
  .mclose{position:absolute;top:12px;right:12px;background:var(--sur2);border:1px solid var(--line);color:var(--ink2);width:30px;height:30px;border-radius:50%;font-size:13px;cursor:pointer;z-index:2}
  /* Modal GRANDE (casi pantalla completa) — para el panel de sanción, más cómodo de rellenar */
  .modal.full{align-items:center;padding:2vh 0}
  .modal.full .modal-card{width:96vw;max-width:1400px;height:96vh;max-height:96vh;border-radius:16px}
  .mhead{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin:0 30px 4px 0}
  .mtit{font-size:19px;font-weight:800}
  .msub{font-size:12.5px;color:var(--ink2);margin-top:3px}
  .mbadges{display:flex;gap:5px;flex-wrap:wrap}
  .mrow{font-size:13px;color:var(--ink2);margin:14px 0 0}
  .mrow b{color:var(--ink);font-weight:600;margin-right:8px}
  .modal-card h4{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin:16px 0 8px}

// Convierte un enlace de Drive/Docs a su URL de vista previa embebible; si es otro
// (p.ej. un PDF directo) lo deja tal cual para meterlo en el iframe.
function _embedUrl(u){
  u=String(u||"").trim();
  let m=u.match(/drive\.google\.com\/file\/d\/([^/?#]+)/); if(m) return "https://drive.google.com/file/d/"+m[1]+"/preview";
  m=u.match(/[?&]id=([^&#]+)/); if(m && /drive\.google\.com/.test(u)) return "https://drive.google.com/file/d/"+m[1]+"/preview";
  m=u.match(/(docs\.google\.com\/(?:document|presentation|spreadsheets)\/d\/[^/?#]+)/); if(m) return "https://"+m[1]+"/preview";
  return u;
}
function _ordenDiaBox(u){
  const src=_embedUrl(u);

    <div style="margin-top:6px;display:flex;justify-content:flex-end;align-items:center;gap:16px">

}
// Visor a pantalla completa: overlay fijo con el documento y un botón grande de salir

function abrirDocFull(src){
  cerrarDocFull();
  const o=document.createElement("div"); o.className="docfull"; o.id="docfull";
  o.innerHTML=`<div class="docfull-bar"><span class="dft">Documento · pantalla completa</span><button class="docfull-x" onclick="cerrarDocFull()" aria-label="Salir de pantalla completa">Salir ✕</button></div>`+
    `<iframe src="${src}" referrerpolicy="no-referrer" allow="fullscreen"></iframe>`;
  document.body.appendChild(o); document.body.style.overflow="hidden";
  window._docFullEsc=e=>{ if(e.key==="Escape") cerrarDocFull(); };
  document.addEventListener("keydown", window._docFullEsc);
}
function cerrarDocFull(){
  const o=document.getElementById("docfull"); if(o) o.remove();
  document.body.style.overflow="";

function _urlB64_(b64){
  const pad = "=".repeat((4 - b64.length % 4) % 4);
  const s = (b64 + pad).replace(/-/g,"+").replace(/_/g,"/");
  const raw = atob(s), arr = new Uint8Array(raw.length);
  for (let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
  return arr;
}
function _pushSoportado_(){ return "serviceWorker" in navigator && "PushManager" in window && "Notification" in window; }
function _esIOS_(){ return /iP(hone|ad|od)/.test(navigator.userAgent) || (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1); }
function _esStandalone_(){ return (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) || window.navigator.standalone === true; }
let _swReg = null;
async function _registrarSW_(){
  if (!("serviceWorker" in navigator)) return null;
  try { _swReg = await navigator.serviceWorker.register("sw.js"); return _swReg; } catch(e){ console.log("SW no registrado:", e); return null; }
}
async function activarNotis(btn){
  if (!_pushSoportado_()){ _notisMsg("Este navegador no soporta notificaciones."); return; }
  if (_esIOS_() && !_esStandalone_()){ _notisMsg("En iPhone: instala la app en la pantalla de inicio (Compartir → Añadir a inicio) y ábrela desde el icono."); _pintarNotisEquipo(); return; }
  if (btn){ btn.disabled=true; btn.textContent="Activando…"; }
  try {
    const perm = await Notification.requestPermission();
    if (perm !== "granted"){ _notisMsg("Permiso denegado. Puedes activarlo en los Ajustes del móvil."); return; }
    const reg = _swReg || await _registrarSW_();
    if (!reg){ _notisMsg("No se pudo preparar el service worker."); return; }
    await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub){ sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:_urlB64_(VAPID_PUBLIC) }); }
    if (SESION){ await api.guardarPush(sub.toJSON()); }
    _notisMsg("¡Notificaciones activadas! ✓");
  } catch(e){ _notisMsg("No se pudo activar: "+((e&&e.message)||e)); }
  finally { _pintarNotisEquipo(); }
}

  if (!_pushSoportado_()) return;

  try { if (reg && Notification.permission==="granted"){ await navigator.serviceWorker.ready; const sub = await reg.pushManager.getSubscription(); if (sub && SESION) api.guardarPush(sub.toJSON()); } } catch(_){}
}

function _ntPintar(){

    w.innerHTML=`<label>Rol<select id="nt-valor" onchange="_ntPrev()">
      <option value="coordinadores">Coordinadores</option>
      <option value="consejo">Consejo</option>
      <option value="revisores">Revisores (PD y José)</option>
      <option value="pd">Solo el Project Director</option></select></label>`;
  } else if(t==="reunion"){
    const rs=(typeof REUNIONES!=="undefined"?REUNIONES:[]).filter(r=>r&&r.id);
    w.innerHTML = rs.length
      ? `<label>Reunión<select id="nt-valor" onchange="_ntPrev()">${rs.map(r=>`<option value="${r.id}">${_escDoc(r.titulo||("Reunión "+r.id))}</option>`).join("")}</select></label>`

  } else { w.innerHTML=""; }   // global: sin selector extra
  _ntPrev();

// Objeto destinatario tal y como lo espera el backend
function _ntDest(){
  const t=(($("nt-tipo")||{}).value)||"global", v=($("nt-valor")||{}).value;
  if(t==="individual") return {tipo:"individual", miembro:v};
  if(t==="subsistema") return {tipo:"grupo", grupo:"subsistema", valor:v};
  if(t==="rol")        return {tipo:"grupo", grupo:"rol", valor:v};
  if(t==="reunion")    return {tipo:"grupo", grupo:"reunion", valor:v};
  return {tipo:"global"};
}
// Cuenta orientativa en cliente (el backend manda; esto es solo para no enviar a ciegas)
function _ntCuantos(){
  const d=_ntDest(), ms=DATA.miembros||[];
  if(d.tipo==="global") return ms.length;
  if(d.tipo==="individual") return d.miembro?1:0;
  if(d.grupo==="subsistema") return ms.filter(m=>m.unidad===d.valor).length;
  if(d.grupo==="rol"){
    if(d.valor==="coordinadores") return ms.filter(m=>m.cargo==="Coordinador").length;
    if(d.valor==="consejo") return (typeof CONSEJO!=="undefined"?CONSEJO.length:0);
    if(d.valor==="revisores") return 2;
    if(d.valor==="pd") return 1;
  }
  if(d.grupo==="reunion"){
    const r=(typeof REUNIONES!=="undefined"?REUNIONES:[]).find(x=>String(x.id)===String(d.valor));
    if(!r) return 0;
    return r.tipo==="general" ? ms.length : ((r.invitados||[]).length);
  }
  return 0;
}
function _ntPrev(){
  const p=$("nt-prev"); if(!p) return;
  const n=_ntCuantos();
  p.textContent=`Llegaría a ${n} ${n===1?"persona":"personas"} · solo a quienes tengan las notificaciones activadas.`;
}

// disponibilidad marcada para la reunión: mapa de calor día × hora
function durTexto(m){const h=Math.floor(m/60),mm=m%60;return ((h?h+" h":"")+(h&&mm?" ":"")+(mm?mm+" min":""))||"0 min";}
const iniMin=f=>{const p=String(f&&f.ini||"0:0").split(":");return (+p[0]||0)*60+(+p[1]||0);};
const finMin=f=>iniMin(f)+(f&&+f.dur||0);
function rejilla(nombre, esPD){
  if(esPD) return `<div class="sindatos">Como Project Director organizas la reunión.<span>Estás exento de cubrir la encuesta.</span></div>`;
  const e=ENC28, marc=e.resp[nombre];
  if(!Array.isArray(marc)) return `<div class="sindatos">No cubriste esta encuesta.<span>Tu disponibilidad para esta reunión no consta.</span></div>`;
  const F0=Array.isArray(e.franjas)?e.franjas:[], nD=(e.dias||[]).length, nF=F0.length;
  if(!nD||!nF) return `<div class="sindatos">Esta encuesta no tiene franjas.<span>No hay nada que mostrar.</span></div>`;
  // columnas ordenadas por hora de inicio (robusto a datos desordenados); pos mapea índice original -> columna
  const orden=F0.map((_,i)=>i).sort((a,b)=> iniMin(F0[a])-iniMin(F0[b]) || (+F0[a].dur||0)-(+F0[b].dur||0));
  const F=orden.map(i=>F0[i]), pos=[]; orden.forEach((oi,k)=>pos[oi]=k);
  const cel=Array.from({length:nD},()=>Array(nF).fill(null));
  (e.bloques||[]).forEach((b,i)=>{ if(Array.isArray(b) && cel[b[0]] && b[1]>=0 && b[1]<nF) cel[b[0]][pos[b[1]]]=marc[i]; });
  const contiguo=F.every((f,i)=> i===0 || iniMin(f)===finMin(F[i-1]));
  const solapado=F.some((f,i)=> i>0 && iniMin(f)<finMin(F[i-1]));
  let g=`<div class="rejwrap"><div class="rejilla" style="grid-template-columns:auto repeat(${nF},minmax(26px,1fr))">`;
  g+=`<div class="rc"></div>`;

  const verLbl=ix=> enHora>=2 ? iniMin(F[ix])%60===0 : (!largo || ix%2===0);
  F.forEach((f,ix)=>{

      : `<div class="rc rh cen" ${tit}>${L?`<span>${et}</span>`:``}</div>`;
  });
  e.dias.forEach((d,di)=>{
    g+=`<div class="rc rd">${d}</div>`;
    for(let f=0;f<nF;f++){ const v=cel[di][f]; g+=`<div class="cel ${v===null?'no':v>=2?'p':v>=1?'t':'na'}"></div>`; }
  });
  g+=`</div></div>`;
  const durs=[...new Set(F.map(f=>+f.dur||0))];
  const durTxt = (durs.length===1 ? `franjas de ${durTexto(durs[0])}` : `franjas de duración variable`) + (solapado?" · solapadas":"");
  const total=marc.reduce((a,b)=>a+((+b||0)>0?1:0),0), np=marc.reduce((a,b)=>a+((+b||0)>=2?1:0),0), modo=e.modalidad||"hibrida";
  const cab = modo==="telematica" ? `Marcaste <b>${total}</b> de ${e.total}` : `Marcaste <b>${total}</b> de ${e.total} · <b style="color:var(--red)">${np}</b> en persona`;
  const leg = modo==="presencial" ? `<span class="pt p"></span>disponibilidad presencial<span class="pt na"></span>no<span class="pt no"></span>no ofertado` : modo==="telematica" ? `<span class="pt t"></span>disponibilidad telemática<span class="pt na"></span>no<span class="pt no"></span>no ofertado` : `<span class="pt p"></span>presencial + telemático<span class="pt t"></span>solo telemático<span class="pt na"></span>no<span class="pt no"></span>no ofertado`;
  return `<div class="dispcab">${cab} · <span style="color:var(--ink3)">${durTxt}</span></div>${g}
    <div class="displeg">${leg}</div>`;
}

  const best=[...slots].sort(porMejor)[0];

  const contiguo=F.every((f,i)=> i===0 || iniMin(f)===finMin(F[i-1]));
  const enHora=F.filter(f=>iniMin(f)%60===0).length, largo=F.some(f=>String(f.ini).slice(3)!=="00"), verLbl=ix=> enHora>=2 ? iniMin(F[ix])%60===0 : (!largo || ix%2===0);
  const verNum = nF<=15;

// medidor segmentado: 10 tramos, tipo instrumento; llenos = puntos
function gauge(p, col){
  const cx=52,cy=52,r=42,n=10,gap=8,step=360/n; let s="";
  for(let i=0;i<n;i++){
    const a0=(-90+i*step+gap/2)*Math.PI/180, a1=(-90+(i+1)*step-gap/2)*Math.PI/180;
    const x0=(cx+r*Math.cos(a0)).toFixed(2), y0=(cy+r*Math.sin(a0)).toFixed(2);
    const x1=(cx+r*Math.cos(a1)).toFixed(2), y1=(cy+r*Math.sin(a1)).toFixed(2);
    s+=`<path d="M${x0} ${y0} A${r} ${r} 0 0 1 ${x1} ${y1}" fill="none"
      stroke="${i<p?col:'var(--sur2)'}" stroke-width="6.5" stroke-linecap="round"/>`;
  }
  return `<div class="gauge"><svg width="104" height="104" viewBox="0 0 104 104">${s}</svg>
    <div class="gval">${p}<span>/ 10</span></div></div>`;
}

const _TK_EST = {"Sin empezar":["se","sin empezar"],"En desarrollo":["ed","en curso"],"Revisando":["rv","revisando"]};
const _TK_ORDU = {"alta":0,"media":1,"baja":2};
// ¿tarea finalizada? Defensivo: el Kanban de Notion marca "Hecha"/"Finalizada"/… — cualquier variante conocida.
// Si no casa, la tarea se trata como ACTIVA (nunca escondemos trabajo vivo en el cajón de finalizadas).
const _TK_FIN_RE = /hech|finaliz|complet|termin|cerrad|acabad|resuelt|done|✔|✅/i;
function _tkFin(t){ return _TK_FIN_RE.test((t&&t.e)||""); }
function _tkVence(l, hoy){
  if(!l) return "sin fecha";
  const d = Math.round((new Date(l)-hoy)/86400000);
  if(d<0) return `venció hace ${-d} día${-d===1?'':'s'}`;
  if(d===0) return "vence hoy";
  return `vence en ${d} día${d===1?'':'s'}`;
}
function _tkOrdAct(a,b){ return (_TK_ORDU[a.u]-_TK_ORDU[b.u]) || ((a.l?+new Date(a.l):9e15)-(b.l?+new Date(b.l):9e15)); }
function _tkFilaAct(t, hoy){
  const [ec,el] = _TK_EST[t.e] || ["se", t.e];
  const rojo = t.u==="alta" || (t.l && new Date(t.l)<hoy);
  return `<div class="fila tk"><div class="tit">${t.n}
    <small>${t.s} · ${t.pr||"—"} · <span class="${rojo?'venc':''}">${_tkVence(t.l,hoy)}</span></small></div>
    <div class="der"><span class="est ${ec}">${el}</span></div></div>`;
}
function _tkFilaFin(t){
  return `<div class="fila tk"><div class="tit">${t.n}

function _togDrawer(btn){ const s=btn.nextElementSibling; if(!s) return; const ab=s.classList.toggle("on"); btn.classList.toggle("ab",ab); }
const _TK_CHEV = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg>`;

// Tareas en la Vista admin: TODO el equipo agrupado por subsistema (unidad), miembros ordenados por carga
// activa; al tocar un miembro se despliegan sus tareas activas + un cajón con las finalizadas.
function _tareasAdminHTML_(){
  const hoy = new Date(DATA.generado);
  const M = DATA.miembros || [];
  const act={}, fin={};
  M.forEach(m=>{ act[m.nombre]=[]; fin[m.nombre]=[]; });
  (typeof TAREAS!=="undefined"?TAREAS:[]).forEach(t=>{ (t.r||[]).forEach(nom=>{
    if(!(nom in act)) return;                 // responsable fuera del roster: se ignora (defensivo)
    if(_tkFin(t)) fin[nom].push(t); else act[nom].push(t);
  }); });
  const grupos={};
  M.forEach(m=>{ (grupos[m.unidad]=grupos[m.unidad]||[]).push(m); });
  const totAct = u => grupos[u].reduce((s,m)=>s+act[m.nombre].length,0);
  const unidades = Object.keys(grupos).sort((a,b)=> totAct(b)-totAct(a) || a.localeCompare(b));
  let out = `<h1>Tareas del equipo</h1><p class="sub">Miembros por subsistema, ordenados por carga activa. Toca a alguien para ver sus tareas.</p>`;
  unidades.forEach(u=>{
    const ms = grupos[u].slice().sort((a,b)=> act[b.nombre].length-act[a.nombre].length || a.pila.localeCompare(b.pila));
    const tot = totAct(u);
    out += `<h2>${u} <span style="color:var(--ink3);font-weight:600">· ${tot} activa${tot===1?'':'s'}</span></h2>`;
    ms.forEach(m=>{

      out += `<div class="tkm" onclick="_togDrawer(this)">

        <div class="der"><span class="tkn mono ${a.length?'':'z'}">${a.length}</span>${_TK_CHEV}</div></div>
        <div class="tkbox">`;
      out += a.length ? `<div class="tarjeta">${a.map(t=>_tkFilaAct(t,hoy)).join("")}</div>`
                      : `<div class="tarjeta"><div class="sindatos">Sin tareas activas.</div></div>`;
      if(f.length){
        out += `<div class="pastog" onclick="_togDrawer(this)"><span>Finalizadas <b>· ${f.length}</b></span>${_TK_CHEV}</div>
          <div class="pas-sec"><div class="tarjeta">${f.map(_tkFilaFin).join("")}</div></div>`;
      }
      out += `</div>`;
    });
  });
  return out;

  const palanca = hMesTemp>=UMBRAL_CUOTA
    ? `<span>Ya pagas de las que menos. <b class="tope">Mantén el ritmo.</b></span>`
    : `<span>Con <b>${faltan} h/mes</b> más de media de temporada bajarías cerca del mínimo (≈20 €).</span>`;
  let alertas = "";
  if (yo.infraccion) alertas += `<div class="alerta mal">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4m0 4h.01M10.3 3.9l-8 14A2 2 0 004 21h16a2 2 0 001.7-3l-8-14a2 2 0 00-3.4 0z"/></svg>
    <span><b>Tienes una infracción este mes.</b> Puedes apelarla en privado al Project Director. Bloquea tu punto automático de agosto.</span></div>`;
  // aviso: reuniones sin cubrir (dinámico)
  let nReu=0, reuFalta=null;
  (typeof REUNIONES!=="undefined"?REUNIONES:[]).forEach(r=>{
    if(!(r&&Array.isArray(r.dias)&&r.dias.length))return;
    const invitado=(r.tipo==="general")||(r.invitados||[]).includes(yo.nombre);
    const abierta=!r.limite||DATA.generado<=r.limite;
    const yaCubri=Array.isArray((r.resp||{})[yo.nombre]);
    const organiza=r.convocante===yo.nombre;
    if(invitado&&abierta&&!yaCubri&&!organiza){ nReu++; if(!reuFalta)reuFalta=r; }
  });
  if(nReu) alertas += `<div class="alerta avi clic" onclick="irA('reuniones')">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg>
    <span><b>Tienes ${nReu} reunión${nReu===1?"":"es"} sin cubrir tu disponibilidad.</b>${nReu===1?` «${reuFalta.titulo}»${reuFalta.limite?` — cierra el ${fLim(reuFalta.limite)}`:""}.`:" Cúbrelas antes de que cierren."}</span><span class="chev">›</span></div>`;
  // aviso: documentos esperando tu aprobación
  const nDoc=(typeof ENTREGABLES!=="undefined"?ENTREGABLES:[]).filter(e=>e.estado==="revision"&&revisoresDe(e).includes(yo.nombre)).length;
  if(nDoc) alertas += `<div class="alerta avi clic" onclick="irA('documentos')">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3v4a1 1 0 001 1h4"/><path d="M17 21H7a2 2 0 01-2-2V5a2 2 0 012-2h7l5 5v11a2 2 0 01-2 2z"/><path d="M9.4 13.6l1.7 1.7 3.3-3.4"/></svg>
    <span><b>Tienes ${nDoc} documento${nDoc===1?"":"s"} esperando tu aprobación.</b> Revísalo${nDoc===1?"":"s"} en Documentos.</span><span class="chev">›</span></div>`;
  // aviso: turnos próximos asignados
  const nTur=(typeof TURNOS!=="undefined"?TURNOS:[]).filter(t=>t.fecha>=DATA.generado&&(t.roles||[]).some(x=>x.miembro===yo.nombre)).length;
  if(nTur) alertas += `<div class="alerta avi clic" onclick="irA('turnos')">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a4 4 0 01-5.4 5.4L4 17v3h3l5.3-5.3a4 4 0 015.4-5.4z"/></svg>
    <span><b>Tienes ${nTur} turno${nTur===1?"":"s"} próximo${nTur===1?"":"s"}.</b> Mira los detalles en Turnos.</span><span class="chev">›</span></div>`;

  $("s-estado").innerHTML = _esAdmin_() ? _adminHomeHTML_() : `
    <div class="cabhome">
      ${gauge(yo.puntos, col)}
      <div><div class="hola">Hola,<b>${yo.pila}</b></div>
        <span class="pill ${CLS[yo.estado]}">${PICO[yo.estado]} ${ETQ[yo.estado]}</span></div>
    </div>
    ${alertas}
    <div class="tarjeta acc">
      <div class="cuota"><div class="n mono" style="color:${cuotaCol}">${yo.cuota.toFixed(2).replace('.',',')}<small> €</small></div>
        <div class="et">cuota anual proyectada<br>se cierra en agosto</div></div>
      <div class="palanca ${hMesTemp>=UMBRAL_CUOTA?'tope':''}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--ok);flex:none"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        ${palanca}</div>
    </div>
    <div class="duo">
      <div class="tarjeta mini"><div class="k">H/mes · temporada</div>
        <div class="v mono">${h(yo.hMes)}</div></div>
      <div class="tarjeta mini"><div class="k">Ranking global</div>
        <div class="v mono">${yo.puesto}<small> de 32</small></div></div>
    </div>
    <div class="tarjeta">
      <div class="fila"><div class="tit">${DATA.reunion.titulo}
        <small>${DATA.reunion.cuando}</small></div>
        <div class="der">${esPD?'la diriges tú':'general'}</div></div>
    </div>`;

  /* 2 · TURNOS — vive de datos/turnos.json (espejo del canal de Discord) */
  (()=>{
    const MES=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
    const DIA=["dom","lun","mar","mié","jue","vie","sáb"];
    const hoyT=new Date(DATA.generado+"T00:00:00");
    const fF=iso=>{const d=new Date(iso+"T00:00:00");const w=DIA[d.getDay()];return `${w[0].toUpperCase()+w.slice(1)} ${d.getDate()} ${MES[d.getMonth()]}`;};
    const esFut=t=>new Date(t.fecha+"T00:00:00")>=hoyT;
    if(_esAdmin_()){ $("s-turnos").innerHTML=_turnosAdminHTML_(); return; }
    const prox=TURNOS.filter(esFut)
      .sort((a,b)=>a.fecha.localeCompare(b.fecha)||(a.hora||"").localeCompare(b.hora||""));
    const mmPas=TURNOS.filter(t=>!esFut(t) && t.roles.some(r=>r.miembro===yo.nombre))
      .sort((a,b)=>b.fecha.localeCompare(a.fecha));   // más reciente primero

    let arriba;
    if(!prox.length){
      arriba = mmPas.length
        ? `<div class="tarjeta"><div class="sindatos">No hay turnos convocados ahora.<span>En verano se paran casi del todo. Abajo tienes los que ya hiciste.</span></div></div>`
        : `<div class="tarjeta"><div class="sindatos">No hay turnos convocados.<span>En verano se paran casi del todo; volverán en otoño. Se convocan en el canal de fabricación de Discord y, al registrarlos, aparecerán aquí.</span></div></div>`;
    }else{
      const mios=prox.filter(t=>t.roles.some(r=>r.miembro===yo.nombre));
      const filaMia=t=>{const r=t.roles.find(x=>x.miembro===yo.nombre);
        return `<div class="fila clicable" onclick="abrirTurno(${TURNOS.indexOf(t)})"><div class="tit">${fF(t.fecha)}<small>${r.rol} · ${t.punto||""}</small></div><div class="der">${t.hora||""} <span class="chev">›</span></div></div>`;};
      const cardAll=t=>{
        const roles=t.roles.map(r=>`<div class="fila"><div class="tit">${r.miembro||"— libre"}<small>${r.rol}</small></div></div>`).join("");
        const cancel=t.cancelable?`<span class="tag">cancelable</span>`:"";
        const sub=[t.momento,t.hora,t.punto].filter(Boolean).join(" · ");
        return `<div class="tarjeta clicable" onclick="abrirTurno(${TURNOS.indexOf(t)})"><div class="fila"><div class="tit">${fF(t.fecha)}<small>${sub}</small></div><div class="der">${cancel} <span class="chev">›</span></div></div>${roles}</div>`;
      };
      arriba=(mios.length
        ? `<h2>Mis próximos turnos</h2><div class="tarjeta">${mios.map(filaMia).join("")}</div>`
        : `<div class="tarjeta"><div class="sindatos">No estás en ningún turno próximo.<span>Cuando te apunten a uno, saldrá aquí.</span></div></div>`)
        + `<h2>Turnos convocados</h2>${prox.map(cardAll).join("")}`;
    }

    // historial personal: memoria de todos los turnos que ha hecho esta temporada
    let hist="";
    if(mmPas.length){
      const chev=`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg>`;
      const filas=mmPas.map(t=>{const r=t.roles.find(x=>x.miembro===yo.nombre);
        return `<div class="fila clicable" onclick="abrirTurno(${TURNOS.indexOf(t)})"><div class="tit">${fF(t.fecha)}<small>${r.rol}${t.punto?" · "+t.punto:""}</small></div><div class="der">${t.duracion||""} <span class="chev">›</span></div></div>`;}).join("");
      hist=`<div class="pastog" id="pastog" onclick="togglePas()"><span>Mis turnos pasados <b>· ${mmPas.length}</b></span>${chev}</div>`
        + `<div class="pas-sec" id="pas"><div class="tarjeta">${filas}</div>`
        + `<p class="pasnota">Tu registro de turnos convocados esta temporada. Las horas oficiales de fabricación se llevan en Notion.</p></div>`;
    }

    $("s-turnos").innerHTML=`<h1>Turnos de fabricación</h1><p class="sub">En cuáles estás, quién más va y lo que ya hiciste.</p>${arriba}${hist}`;
  })();

  /* 3 · TAREAS */
  if(_esAdmin_()){
    $("s-tareas").innerHTML = _tareasAdminHTML_();     // vista global: equipo por subsistema + carga activa
  } else {
    const HOY = new Date(DATA.generado);
    const misTodas = TAREAS.filter(t => t.r.includes(yo.nombre));
    const mias = misTodas.filter(t=>!_tkFin(t)).sort(_tkOrdAct);                       // activas
    const misFin = misTodas.filter(_tkFin).sort((a,b)=> (b.l||"").localeCompare(a.l||"")); // finalizadas → cajón
    const cuerpo = mias.length ? `<div class="tarjeta">${mias.map(t=>_tkFilaAct(t,HOY)).join("")}</div>
      <p class="pie">Vienen del Kanban de tu subsistema en Notion. Las «importante» y «urgente» se pueden apelar (Art. 34).</p>`
      : `<div class="tarjeta"><div class="sindatos">No tienes tareas activas ahora mismo.<span>Cuando tu coordinador te asigne una en el Kanban, aparecerá aquí.</span></div></div>`;
    const finDr = misFin.length
      ? `<div class="pastog" onclick="_togDrawer(this)"><span>Finalizadas <b>· ${misFin.length}</b></span>${_TK_CHEV}</div>`
        + `<div class="pas-sec"><div class="tarjeta">${misFin.map(_tkFilaFin).join("")}</div></div>`
      : "";
    $("s-tareas").innerHTML = `
      <h1>Mis tareas</h1>
      <p class="sub">${mias.length?`${mias.length} activa${mias.length===1?'':'s'} · de los Kanban de Notion`:'Lo que tienes asignado.'}</p>
      ${cuerpo}${finDr}`;
  }
  $("s-documentos").innerHTML = _esAdmin_() ? _docsAdminHTML_() : docsPantalla(yo);
  pintarBadges(yo);
  _ajustarNavAdmin_();

  /* 4 · REUNIONES */
  const misReu = _esAdmin_() ? REUNIONES.filter(r=>r) : REUNIONES.filter(r => r && (r.convocante===yo.nombre || r.tipo==="general" || (r.invitados||[]).includes(yo.nombre)));
  $("s-reuniones").innerHTML = `
    <h1>Reuniones</h1>
    <p class="sub">${_esAdmin_()?"Todas las reuniones del equipo · administración (no convocas: no eres una persona real).":"Tus reuniones y encuestas de disponibilidad."}</p>
    ${_esAdmin_()?``:`<div class="crear-btn" style="margin:0 0 6px"><button class="ebtn" onclick="crearEncuesta()">Convocar reunión</button></div>`}
    <h2>${_esAdmin_()?"Todas las reuniones":"Mis reuniones"}</h2>
    ${misReu.length
      ? misReu.map(r=>reuCard(r,yo)).join("")
      : (_esAdmin_()?`<div class="tarjeta"><div class="sindatos">No hay reuniones convocadas.</div></div>`:`<div class="tarjeta"><div class="sindatos">Actualmente no estás convocado a ninguna reunión.<span>Cuando te convoquen a una —o la convoques tú— aparecerá aquí.</span></div></div>`)}`;

  /* 5 · CONTRIBUCIÓN */
  const d = yo.desglose, techo = d.techo_mensual;
  const cargaPct = Math.min(100, yo.carga/1.8);
  const bandaMin = 60/1.8, bandaMax = 90/1.8;
  // ranking censurado: mi puesto y vecinos
  const rk = [...DATA.miembros].sort((a,b)=>(b.hMes||0)-(a.hMes||0));
  // En modo miembro el backend no manda las horas ajenas: la posicion autoritativa
  // viene del ranking anonimo (puesto/total). En admin, del propio orden.
  const yoRank = DATA._ranking ? (DATA._ranking.puesto||1)-1 : rk.findIndex(m=>m.nombre===yo.nombre);
  const rankTotal = DATA._ranking ? (DATA._ranking.total||rk.length) : rk.length;
  const vecinos = [];
  for(let i=Math.max(0,yoRank-2); i<=Math.min(rankTotal-1,yoRank+2); i++) vecinos.push(i);
  const rankHTML = vecinos.map(i=>{
    const mine=i===yoRank;
    return mine
      ? `<div class="r yo"><span class="p mono">${i+1}</span><span class="nom">${yo.pila} (tú)</span><span class="hrs mono">${h(yo.hMes)}</span></div>`
      : `<div class="r"><span class="p mono">${i+1}</span><span class="cens"></span></div>`;
  }).join("");

  $("s-contrib").innerHTML = _esAdmin_() ? _panelPDHTML_() : `
    <h1>Mi contribución</h1>
    <p class="sub">Horas, carga y en qué punto estás.</p>
    <div class="duo">
      <div class="tarjeta mini"><div class="k">H/mes temporada</div><div class="v mono">${h(yo.hMes)}</div></div>
      <div class="tarjeta mini"><div class="k">Aporta a carga</div><div class="v mono">${d.aporta_mes_actual}<small>%</small></div></div>
    </div>
    <h2>Mi carga del mes</h2>
    <div class="tarjeta">
      <div class="banda">
        <div class="via"></div>
        <div class="sana" style="left:${bandaMin}%;width:${bandaMax-bandaMin}%"></div>
        <div class="yo" style="left:calc(${cargaPct}% - 1.5px)"></div>
        <span class="et" style="left:${bandaMin}%">60</span>
        <span class="et" style="left:${bandaMax}%">90</span>
      </div>
      <div class="fila" style="border:0;padding-bottom:0">
        <div class="tit">Carga ${yo.carga}<small>de este mes ${d.aporta_mes_actual} · arrastre ${d.arrastre}</small></div>
        <div class="der">banda sana 60–90</div></div>
    </div>
    <h2>Mi cuota</h2>
    <div class="tarjeta">
      <div class="cuota"><div class="n mono" style="color:${cuotaCol}">${yo.cuota.toFixed(2).replace('.',',')}<small> €</small></div>
        <div class="et">al año · se paga antes<br>de empezar la temporada</div></div>
      ${(()=>{
        const eur=n=>n.toFixed(2).replace('.',',');
        if(!yo.coche) return `<div class="recibo"><div class="rnota">Aún sin descuentos · poner el coche para ir al CITI resta 4 € por turno.</div></div>`;
        const base=yo.cuota_base, ganado=yo.coche*4, aplicado=base-yo.cuota, cubre=ganado>base+1e-9;
        return `<div class="recibo">
          <div class="rl"><span>Cuota por tus horas</span><span class="ra">${eur(base)} €</span></div>
          <div class="rl desc"><span>Por poner el coche · ${yo.coche} turno${yo.coche===1?'':'s'}</span><span class="ra">−${eur(aplicado)} €</span></div>
          ${cubre?`<div class="rnota">Son ${yo.coche} × 4 € = ${eur(ganado)} € de descuento: te cubren la cuota entera (pagas 0 €, nunca menos).</div>`:''}
        </div>`;
      })()}
      <div class="palanca ${hMesTemp>=UMBRAL_CUOTA?'tope':''}">${palanca}</div>
      <p style="margin:10px 0 0;font-size:11.5px;color:var(--ink3)">Se calcula con tus <b style="color:var(--ink2)">${yo.horasTemp} h</b> en ${yo.meses} ${yo.meses===1?'mes':'meses'} dentro del equipo (sep–ago). Conducir al CITI descuenta 4 € por turno (los de Vigo no). El primer año todos entráis como socios nuevos: tarifa plana de 15 €.</p>
    </div>
    <h2>Ranking de horas · temporada ${DATA.temporada}</h2>
    <div class="tarjeta rank">${rankHTML}
      <p class="pie" style="padding:10px 0 0">Media de horas/mes de la temporada. Ves tu puesto; el resto va sin nombre.</p>
    </div>`;
  if(_esAdmin_()){ _cargarColaSanc_(); _ntPintar(); }   // Panel PD: cola de sanciones (debounced) + selector de destinatario

  /* 6 · EQUIPO */
  const coords = DATA.miembros.filter(m=>m.cargo).sort((a,b)=>
    (a.cargo==="Project Director"?0:1)-(b.cargo==="Project Director"?0:1));
  const maxSub = DATA.subsistemas[0].media;
  const subHTML = DATA.subsistemas.map((s,i)=>{
    const mine = !_esAdmin_() && s.u===yo.unidad;
    return `<div class="fila" style="${mine?'background:linear-gradient(90deg,rgba(245,166,35,.07),transparent);margin:0 -8px;padding:11px 8px;border-radius:9px':''}">
      <div class="tit" style="${mine?'color:var(--red2)':''}">${i+1}. ${s.u}${mine?' (tú)':''}
        <small>${s.n} ${s.n===1?'persona':'personas'}</small>
        <div class="barra"><i style="width:${s.media/maxSub*100}%;background:${mine?'var(--red)':'var(--info)'}"></i></div></div>
      <div class="der mono">${s.media} h</div></div>`;
  }).join("");
  $("s-equipo").innerHTML = `
    <h1>El equipo</h1>
    <p class="sub">Quién coordina qué y cómo va cada unidad.</p>
    ${_esAdmin_()?_rosterAdminHTML_():''}
    <h2>Ranking de subsistemas <span style="color:var(--ink3);font-weight:600">· media/persona</span></h2>
    <div class="tarjeta">${subHTML}</div>
    <h2>Coordinación</h2>
    <div class="tarjeta">
      ${coords.map(m=>`<div class="fila"><div class="tit">${m.nombre}
        <small>${m.cargo==="Project Director"?"Project Director":"coordina "+m.unidad}</small></div>
        <div class="der">${m.cargo==="Project Director"?"dirección":m.unidad.split(" ")[0]}</div></div>`).join("")}
    </div>
    <h2>Notificaciones</h2>
    <div class="tarjeta"><div id="notis-box">${_notisEquipoHTML()}</div>
      ${_esAdminPush_() ? `<button class="ebtn sec" style="margin-top:8px" onclick="_enviarPrueba_(this)">Enviar notificación de prueba (a mí)</button>` : ``}
      <p class="pie">Avisos de reuniones, documentos y anuncios. Los importantes llegan siempre; podrás silenciar solo las noticias.</p></div>
    <p class="pie">SOLARIS · datos a ${DATA.generado.split("-").reverse().join("/")}</p>`;
}

/* ── Panel manual de sanción (PD) ─────────────────────────────────────────
   Elige miembro + motivo (combobox del RRI o texto libre) + puntos (fijo, desplegable si el
   motivo admite varios, o libre) con preview de puntos antes→después. v1: PREPARA las sanciones
   en una lista; la persistencia/aplicación irá por la cola del backend + rutina (pendiente de deploy). */
let _sancionSel = null;
window._sancPend = window._sancPend || [];
function _estadoPts(p){ return p<=2 ? "evaluación" : (p>=9 ? "elegible" : "normal"); }
function _todosMotivos(){ return RRI_MOTIVOS.restas.concat(RRI_MOTIVOS.sumas); }
function abrirSancionar(){
  $("modal-body").innerHTML = `
    <div class="mtit">🔨 Sancionar</div>
    <div class="msub">Puntos del RRI (Título VII) o motivo libre. Entra en la cola como <b>pendiente</b>; la confirmas en el Panel PD y la aplica la rutina. Si marcas <b>varias personas</b>, van como un <b>paquete</b>: una sola tarjeta en la cola y <b>un único comunicado</b> de Discord.</div>
    <div class="cform">
      <label>Sancionar a<select id="sc-modo" onchange="_scPintarMiembros()">
        <option value="una">Una persona</option>
        <option value="varias">Varias personas (paquete)</option>
      </select></label>
      <div id="sc-miembrowrap"></div>
      <label class="cinv">Motivo<input id="sc-mot" placeholder="elige del RRI o escribe uno libre…" autocomplete="off"><div id="sc-sug" class="csug" style="display:none"></div></label>
      <div id="sc-ptswrap"></div>
    </div>
    <div id="sc-prev" class="tarjeta" style="margin-top:12px;display:none"></div>
    <div id="sc-err" class="er" style="margin-top:6px"></div>
    <button class="ebtn" style="margin-top:12px" onclick="_enviarSanc(this)">Añadir a la cola</button>`;
  $("modal").classList.add("on");
  $("modal").classList.add("full");   // el panel de sanción va a (casi) pantalla completa
  _sancionSel = null;
  _scPintarMiembros();
  _scWire();
  _scPintarPts();
}
// Selector de destinatarios de la sanción: una persona (select) o varias (lista con casillas + buscador)
function _scPintarMiembros(){
  const w=$("sc-miembrowrap"); if(!w) return;
  const modo=(($("sc-modo")||{}).value)||"una";
  const ms=[...(DATA.miembros||[])].sort((a,b)=>a.nombre.localeCompare(b.nombre));
  if(modo==="una"){
    w.innerHTML=`<label>Miembro<select id="sc-miembro" onchange="_scPrev()">${ms.map(m=>`<option value="${_escDoc(m.nombre)}">${_escDoc(m.nombre)}${m.cargo?" · "+_escDoc(m.cargo):""}</option>`).join("")}</select></label>`;
  } else {
    w.innerHTML=`<label>Miembros <span style="color:var(--ink3)">(marca a quién sancionar)</span>
        <input id="sc-buscar" placeholder="buscar…" autocomplete="off" oninput="_scFiltrarMiembros()"></label>
      <div class="scms" id="sc-lista">${ms.map(m=>`<label data-n="${_escDoc(m.nombre.toLowerCase())}"><input type="checkbox" value="${_escDoc(m.nombre)}" onchange="_scPrev()"><span>${_escDoc(m.nombre)}${m.cargo?` <small>· ${_escDoc(m.cargo)}</small>`:""}</span></label>`).join("")}</div>
      <div class="scmsbar"><button type="button" onclick="_scTodos(true)">Todos</button><button type="button" onclick="_scTodos(false)">Ninguno</button><span id="sc-cuenta">0 seleccionados</span></div>`;
  }
  _scPrev();
}
function _scFiltrarMiembros(){
  const q=((($("sc-buscar")||{}).value)||"").toLowerCase().trim(), l=$("sc-lista"); if(!l) return;
  l.querySelectorAll("label").forEach(x=>{ x.style.display=(!q || (x.dataset.n||"").includes(q))?"":"none"; });
}
function _scTodos(v){
  const l=$("sc-lista"); if(!l) return;
  l.querySelectorAll('input[type=checkbox]').forEach(c=>{ if(c.closest("label").style.display!=="none") c.checked=v; });
  _scPrev();
}
// Nombres elegidos: 1 en modo "una", N en modo "varias"
function _scSel(){
  if(((($("sc-modo")||{}).value)||"una")==="una"){ const v=($("sc-miembro")||{}).value; return v?[v]:[]; }
  const l=$("sc-lista"); if(!l) return [];
  return [...l.querySelectorAll('input[type=checkbox]:checked')].map(c=>c.value);
}
function _scWire(){
  const inp=$("sc-mot"), sug=$("sc-sug"); if(!inp) return;
  const otro=_todosMotivos().find(m=>m.libre);
  const render=()=>{
    const q=(inp.value||"").toLowerCase().trim();
    let hits = q ? _todosMotivos().filter(m=>m.texto.toLowerCase().includes(q) || ("art. "+m.art).toLowerCase().includes(q)) : _todosMotivos();
    if(!hits.length && otro) hits=[otro];   // sin coincidencias → ofrece "Otra" (texto libre)
    if(!hits.length){ sug.style.display="none"; return; }
    sug.innerHTML=hits.map(m=>`<div data-id="${m.id}">${m.libre?"Otra (motivo libre)":m.texto} <small>· ${m.libre?"lo escribes tú":"Art. "+m.art+" · "+(m.opciones?m.opciones.join("/")+" pts":(m.puntos>0?"+":"")+m.puntos+" pts")}</small></div>`).join("");
    sug.style.display="";
    sug.querySelectorAll("div").forEach(d=>d.onclick=()=>{ _sancionSel=_todosMotivos().find(x=>x.id===d.dataset.id); inp.value=_sancionSel.libre?"Otra":_sancionSel.texto; sug.style.display="none"; _scPintarPts(); });
  };
  inp.oninput=render;
  inp.onfocus=render;   // ← al poner el cursor, se abre el desplegable sin escribir nada
  inp.onblur=()=>setTimeout(()=>{ if(sug) sug.style.display="none"; },160);
}
function _scPintarPts(){
  const w=$("sc-ptswrap"); if(!w) return; const m=_sancionSel;
  if(!m){ w.innerHTML=""; _scPrev(); return; }
  if(m.libre){ w.innerHTML=`<label>Motivo libre<input id="sc-motlibre" placeholder="describe la infracción…" autocomplete="off" oninput="_scPrev()"></label>`
      + `<label>Puntos <span style="color:var(--ink3)">(a mano)</span><input id="sc-pts" type="number" step="1" placeholder="ej. -1" oninput="_scPrev()"></label>`; }
  else if(m.opciones){ w.innerHTML=`<label>Puntos<select id="sc-pts" onchange="_scPrev()">${m.opciones.map(o=>`<option value="${o}">${o>0?"+":""}${o}</option>`).join("")}</select></label>`; }
  else { w.innerHTML=`<label>Puntos<input id="sc-pts" value="${m.puntos}" readonly style="opacity:.75"></label>`; }
  _scPrev();
}
function _scPts(){ const e=$("sc-pts"); return e ? parseInt(e.value,10) : NaN; }
// El select/lista guardan el NOMBRE (no el índice): buscar por nombre, nunca por DATA.miembros[i]
function _scMiembro(n){ return (DATA.miembros||[]).find(m=>m.nombre===n)||null; }
function _scPrev(){
  const nombres=_scSel(), d=_scPts();
  const cnt=$("sc-cuenta"); if(cnt) cnt.textContent=`${nombres.length} seleccionado${nombres.length===1?"":"s"}`;
  const prev=$("sc-prev"); if(!prev) return;
  if(!nombres.length || !_sancionSel || isNaN(d) || d===0){ prev.style.display="none"; return; }
  const texto=_sancionSel.libre ? (($("sc-motlibre")||{}).value||"(motivo libre)") : _sancionSel.texto;
  prev.style.display="";
  // Con varios, la cabecera dice que van como paquete y cada fila enseña su propio antes→después
  const cab = nombres.length>1
    ? `<div class="fila"><div class="tit"><b>Paquete de ${nombres.length} sanciones</b><small>${_escDoc(texto)}</small></div>
        <div class="der mono">${d>0?"+":""}${d} <small>c/u</small></div></div>` : "";
  prev.innerHTML = cab + nombres.map(n=>{
    const m=_scMiembro(n); if(!m) return "";
    const antes=(m.puntos!=null?m.puntos:5), despues=Math.max(0,Math.min(10,antes+d));
    const quien=_escDoc(m.pila||m.nombre);
    return `<div class="fila"><div class="tit">${quien}${nombres.length>1?"":`<small>${_escDoc(texto)}</small>`}</div>
      <div class="der mono">${antes} → <b style="color:${d<0?'var(--red2)':'var(--ok)'}">${despues}</b> <small>· ${_estadoPts(despues)}</small></div></div>
      ${(despues===antes&&d<0)?`<div class="er" style="color:var(--warn);margin-top:4px">${quien} ya está en el suelo (0): no baja más.</div>`:``}`;
  }).join("");
}
async function _enviarSanc(btn){
  const err=$("sc-err"); err.textContent=""; err.style.color="var(--red2)";
  const nombres=_scSel(); const d=_scPts(); const mot=_sancionSel;
  if(!nombres.length){ err.textContent="Elige a quién sancionar."; return; }
  if(!mot){ err.textContent="Elige un motivo de la lista (o «Otra»)."; return; }
  const texto = mot.libre ? (($("sc-motlibre")||{}).value||"").trim() : mot.texto;
  const art = mot.libre ? "libre" : mot.art;
  if(mot.libre && !texto){ err.textContent="Escribe el motivo libre."; return; }
  if(isNaN(d)||d===0){ err.textContent="Indica los puntos (distintos de 0)."; return; }
  if(typeof backendOK!=="undefined" && !backendOK){ err.textContent="Sin conexión con el backend; no se puede encolar."; return; }
  // Varias personas = un PAQUETE: comparten `lote`, así la cola las agrupa y se deciden juntas
  // (y el comunicado de Discord sale como un solo bloque). Una sola va suelta, sin lote.
  const lote = nombres.length>1 ? `manual-${new Date().toISOString().slice(0,10)}-${Math.random().toString(36).slice(2,7)}` : "";
  const items = nombres.map(n=>{
    const it={ origen:"manual", nombre:n, motivo:texto, articulo:art, puntos:d };
    if(lote) it.lote=lote;
    return it;
  });
  const prev=btn?btn.textContent:""; if(btn){ btn.disabled=true; btn.textContent="Enviando…"; }
  try{
    await api.pushSancion(items);  // _apiParse lanza si falla
    const uno=_scMiembro(nombres[0]);
    err.style.color="var(--ok)";
    err.textContent = items.length===1
      ? `Añadida a la cola: ${(uno&&(uno.pila||uno.nombre))||nombres[0]} · ${d>0?"+":""}${d} (pendiente de confirmar).`
      : `Añadidas a la cola: ${items.length} sanciones de ${d>0?"+":""}${d}, como un paquete (pendientes de confirmar).`;
    _sancionSel=null; const inp=$("sc-mot"); if(inp) inp.value=""; _scPintarPts();   // reset para encolar otra
    _scTodos(false);                                                                 // y limpia la selección: no reenviar sin querer
    _cargarColaSanc_(true);                                                          // refresca la cola del Panel PD
  }catch(e){ err.style.color="var(--red2)"; err.textContent="No se pudo añadir: "+e.message; }
  finally{ if(btn){ btn.disabled=false; btn.textContent=prev||"Añadir a la cola"; } }
}
// ── Cola de sanciones en el Panel PD (getSanciones -> aprobar / modificar / rechazar) ──
let _colaSancTs = 0, _colaSancCache = null, _sancBusy = false;
// Aviso flotante de progreso: vive FUERA de la cola, así sobrevive a que la tarjeta se
// repinte o la cierres. Antes el "3/5…" se pintaba dentro del botón y desaparecía con él.
function _sancProg(txt){
  let t=$("sc-prog");
  if(txt==null){ if(t) t.remove(); return; }
  if(!t){ t=document.createElement("div"); t.id="sc-prog"; t.className="scprog"; document.body.appendChild(t); }
  t.innerHTML=txt;
}
async function _cargarColaSanc_(force){
  const box=$("pd-cola"); if(!box) return;
  if(_sancBusy) return;   // hay decisiones en vuelo: no repintar hasta que acaben
  if(typeof backendOK!=="undefined" && !backendOK){ if(!_colaSancCache) box.innerHTML=`<div class="tarjeta"><div class="sindatos">Conectando…</div></div>`; return; }  // sin marcar ts: reintenta al siguiente render
  const now=+new Date(); if(!force && now-_colaSancTs<4000) return;   // debounce (no spamear en polls)
  _colaSancTs=now;
  try{
    const arr=await api.getSanciones({});      // _apiParse ya devuelve el DATA (el array); lanza si el backend da error
    const next=Array.isArray(arr)?arr:[];
    if(_colaSancCache && JSON.stringify(next)===JSON.stringify(_colaSancCache)) return;   // sin cambios: no repintar (evita parpadeo del poll y respeta el "Aprobando…")
    _colaSancCache=next;
    box.innerHTML=_colaSancHTML_(_colaSancCache);
  }catch(e){ if(!_colaSancCache) box.innerHTML=`<div class="tarjeta"><div class="sindatos">No se pudo cargar la cola: ${e.message}</div></div>`; }
}
function _colaSancHTML_(arr){
  if(!arr.length) return `<div class="tarjeta"><div class="sindatos">No hay sanciones en la cola.</div></div>`;
  const pend=arr.filter(s=>s.estado==="pendiente"), apr=arr.filter(s=>s.estado==="aprobada"),
        otras=arr.filter(s=>s.estado==="rechazada"||s.estado==="aplicada");
  // Botonera de una fila, común a sueltas y a las de dentro de un lote.
  const esRevoc=s=>s.origen==="revocacion";
  const yaRevocada=s=>(arr||[]).some(x=>esRevoc(x) && x.extra && String(x.extra.revoca)===String(s.id) && x.estado!=="rechazada");
  const acciones=s=>{
    if(s.estado==="pendiente") return `<div class="scitem-a"><button class="scok" onclick="_decSanc(${s.id},'aprobar',null,this)">Aprobar</button><button class="scmod" onclick="_modSanc(${s.id})">Modificar</button><button class="scno" onclick="_decSanc(${s.id},'rechazar',null,this)">Rechazar</button></div>`;
    if(s.estado==="aprobada") return `<div class="scitem-a"><span class="scpill ok">aprobada · a aplicar</span></div>`;
    if(s.estado==="revocada") return `<div class="scitem-a"><span class="scpill">revocada</span></div>`;
    if(s.estado==="aplicada"){
      // Una sanción aplicada ya no se puede tocar, pero SÍ revocar: se encola el movimiento inverso.
      if(esRevoc(s)) return `<div class="scitem-a"><span class="scpill ok">devuelta</span></div>`;
      if(yaRevocada(s)) return `<div class="scitem-a"><span class="scpill">revocación en curso</span></div>`;
      return `<div class="scitem-a"><span class="scpill ok">aplicada</span><button class="scmod" onclick="abrirRevocar(${s.id})">Revocar</button></div>`;
    }
    return `<div class="scitem-a"><span class="scpill no">rechazada</span></div>`;
  };
  const linea=s=>{
    const col=s.puntos<0?'var(--red2)':'var(--ok)';
    const pila=(esRevoc(s)?"↩️ ":"")+(s.nombre||"").split(" ")[0];
    const art=(s.articulo&&s.articulo!=="libre")?` · Art. ${_escDoc(s.articulo)}`:"";
    const org=s.origen==="reunion"?" · reunión":"";
    const jus=s.justificacion?` · ${_escDoc(s.justificacion)}`:"";
    const meta=`${_escDoc(s.motivo||"(sin motivo)")}${art}${org}${jus}`;
    return `<div class="scitem">
      <div class="scitem-h"><span class="scitem-n">${_escDoc(pila)}</span><span class="scitem-p" style="color:${col}">${s.puntos>0?"+":""}${s.puntos}</span></div>
      <div class="scitem-m">${meta}</div>${acciones(s)}</div>`;
  };
  // Fila compacta para miembros de un LOTE: el motivo/artículo va una sola vez en la cabecera del lote
  const lineaLote=s=>{
    const col=s.puntos<0?'var(--red2)':'var(--ok)';
    const jus=s.justificacion?`<div class="scitem-m" style="margin:2px 0 8px">${_escDoc(s.justificacion)}</div>`:``;
    return `<div class="scitem">
      <div class="scitem-h"><span class="scitem-n">${esRevoc(s)?"↩️ ":""}${_escDoc(s.nombre||"")}</span><span class="scitem-p" style="color:${col}">${s.puntos>0?"+":""}${s.puntos}</span></div>
      ${jus}${acciones(s)}</div>`;
  };
  // Agrupa por lote (las sueltas van aparte)
  const agrupar=a=>{
    const g=new Map(), sueltas=[];
    a.forEach(s=>{ if(s.lote){ if(!g.has(s.lote)) g.set(s.lote,[]); g.get(s.lote).push(s); } else sueltas.push(s); });
    return { grupos:[...g.entries()], sueltas };
  };
  const grupoHTML=(lote,items,conBulk)=>{
    const n=items.length, s0=items[0]||{};
    const art=(s0.articulo&&s0.articulo!=="libre")?` · Art. ${_escDoc(s0.articulo)}`:"";
    const org=s0.origen==="reunion"?" · reunión":"";
    const lsafe=String(lote).replace(/['"\\]/g,"");
    // Se enseña lo que le cae A CADA UNO, no la suma del lote: un "−5" hace pensar que
    // alguien pierde 5 puntos, cuando son 5 personas a −1.
    const vals=[...new Set(items.map(s=>Number(s.puntos)||0))].sort((a,b)=>Math.abs(a)-Math.abs(b));
    const et=p=>`${p>0?"+":"−"}${Math.abs(p)} ${Math.abs(p)===1?"punto":"puntos"}`;
    const cuanto = vals.length===1 ? `${et(vals[0])}${n>1?" c/u":""}` : `de ${et(vals[0])} a ${et(vals[vals.length-1])}`;
    const col = vals[vals.length-1]<0 ? 'var(--red2)' : 'var(--ok)';
    // Aplicadas: se pueden anular varias del paquete de una vez, eligiendo a quién.
    const nRev=items.filter(s=>s.estado==="aplicada" && !esRevoc(s) && !yaRevocada(s)).length;
    const bulk=conBulk?`<div class="scitem-a" style="margin-top:10px">
        <button class="scok" onclick="_decLote_('${lsafe}','aprobar',this)">Aprobar las ${n}</button>
        <button class="scno" onclick="_decLote_('${lsafe}','rechazar',this)">Rechazar las ${n}</button></div>`
      : (nRev?`<div class="scitem-a" style="margin-top:10px">
        <button class="scmod" onclick="abrirRevocarLote('${lsafe}')">Revocar…${nRev<n?` (${nRev} revocables)`:""}</button></div>`:"");
    // La lista de personas nace PLEGADA: el lote se lee de un vistazo y se abre solo si
    // quieres tocar a alguien en concreto.
    return `<div class="sclote">
      <div class="sclote-h"><b>${n} ${n===1?"persona":"personas"}</b><span class="mono" style="color:${col}">${cuanto}</span></div>
      <div class="sclote-m">${_escDoc(s0.motivo||"(sin motivo)")}${art}${org}</div>
      ${bulk}
      <div class="pastog" onclick="_togDrawer(this)"><b>Ver ${n===1?"a la persona":`las ${n} personas`}</b>${_TK_CHEV}</div>
      <div class="pas-sec"><div class="sclote-items">${items.map(lineaLote).join("")}</div></div>
    </div>`;
  };
  const sec=(t,a,conBulk)=>{
    if(!a.length) return "";
    const {grupos,sueltas}=agrupar(a);
    let h=t?`<h3 class="scsec">${t} · ${a.length}</h3>`:"";
    grupos.forEach(([lote,items])=>{ h+=grupoHTML(lote,items,conBulk); });
    if(sueltas.length) h+=`<div class="tarjeta">${sueltas.map(linea).join("")}</div>`;
    return h;
  };
  let out = sec("Pendientes de confirmar", pend, true) + sec("Aprobadas · esperando rutina", apr, false);
  // Las resueltas no paran de crecer (son el historial). Van plegadas y recortadas a las
  // últimas, para que la cola siga siendo una bandeja de trabajo y no un archivo.
  if(otras.length){
    const TOPE=15;
    const ord=[...otras].sort((a,b)=>String(b.decidido_at||b.creado_at||"").localeCompare(String(a.decidido_at||a.creado_at||"")));
    const vis=ord.slice(0,TOPE), resto=ord.length-vis.length;
    out += `<h3 class="scsec">Resueltas · ${otras.length}</h3>
      <div class="pastog" onclick="_togDrawer(this)"><b>Ver el historial</b>${_TK_CHEV}</div>
      <div class="pas-sec">${sec("", vis, false)}
        ${resto>0?`<div class="sindatos" style="padding:10px 2px">y ${resto} más antiguas</div>`:""}</div>`;
  }
  return out;
}
async function _decSanc(id, accion, opts, btn){
  if(typeof backendOK!=="undefined" && !backendOK) return;
  // feedback inmediato (Apps Script puede tardar en frío): la fila muestra "Aprobando…/Rechazando…"
  const item = (btn && btn.closest) ? btn.closest('.scitem') : null;
  const acc = item ? item.querySelector('.scitem-a') : null;
  const prev = acc ? acc.innerHTML : null;
  const verbo = accion==='rechazar'?'Rechazando':'Aprobando';
  if(acc) acc.innerHTML = `<span class="scitem-wait">${verbo}…</span>`;
  _sancProg(`<b>${verbo}…</b>`);
  _sancBusy=true;   // el auto-refresco no puede repintar mientras esto está en vuelo
  try{ await api.decidirSancion(id, accion, opts||{}); _sancBusy=false; await _cargarColaSanc_(true); }   // _apiParse lanza si falla
  catch(e){ _sancBusy=false; if(acc) acc.innerHTML=prev; const box=$("pd-cola"); if(box) box.insertAdjacentHTML("afterbegin",`<div class="er" style="color:var(--red2);margin-bottom:6px">No se pudo: ${e.message}</div>`); }
  finally{ _sancBusy=false; setTimeout(()=>_sancProg(null), 1200); }
}
// Decide de golpe todas las PENDIENTES de un lote. Secuencial a propósito: el backend guarda la
// cola entera de una vez (read-modify-write), así que en paralelo las decisiones se pisarían.
async function _decLote_(lote, accion, btn){
  if(typeof backendOK!=="undefined" && !backendOK) return;
  const ids=(_colaSancCache||[]).filter(s=>s.lote===lote && s.estado==="pendiente").map(s=>s.id);
  if(!ids.length){ _cargarColaSanc_(true); return; }
  const acc = (btn && btn.closest) ? btn.closest('.scitem-a') : null;
  const previo = acc ? acc.innerHTML : null;
  const verbo = accion==='rechazar' ? 'Rechazando' : 'Aprobando';
  const fallos=[]; let hechas=0;
  _sancBusy=true;                      // congela el auto-refresco: si repinta a media tanda, te borra el progreso
  try{
    for(let i=0;i<ids.length;i++){
      const paso=`${verbo} ${i+1}/${ids.length}…`;
      if(acc) acc.innerHTML=`<span class="scitem-wait">${paso}</span>`;
      _sancProg(`<b>${paso}</b><small>no cierres la app hasta que acabe</small>`);
      try{ await api.decidirSancion(ids[i], accion, {}); hechas++; }   // _apiParse lanza si falla
      catch(e){ fallos.push(e.message); }
    }
  } finally { _sancBusy=false; }
  _sancProg(`<b>${hechas}/${ids.length} ${accion==='rechazar'?'rechazadas':'aprobadas'}</b><small>actualizando la cola…</small>`);
  try{ await _cargarColaSanc_(true); }catch(e){}
  setTimeout(()=>_sancProg(null), 2500);
  if(fallos.length){
    if(acc && !hechas) acc.innerHTML=previo;                          // no cambió nada: deja los botones
    const box=$("pd-cola");
    if(box) box.insertAdjacentHTML("afterbegin",`<div class="er" style="color:var(--red2);margin-bottom:6px">${hechas}/${ids.length} ${accion==='rechazar'?'rechazadas':'aprobadas'}. Falló: ${_escDoc(fallos.join(" · "))}</div>`);
  }
}
// ── Revocar una sanción ya aplicada (apelación aceptada / error) ──────────────────
// No se "borra" nada: se encola un movimiento INVERSO que pasa por la misma cola y que
// tú apruebas igual que una sanción. Así queda rastro de la sanción y de su marcha atrás.
function _sancPorId(id){ return (_colaSancCache||[]).find(s=>String(s.id)===String(id))||null; }
// Sanciones de un lote que todavía se pueden revocar (aplicadas y sin revocación en marcha)
function _revocables(lote){
  const c=_colaSancCache||[];
  return c.filter(s=>s.lote===lote && s.estado==="aplicada" && s.origen!=="revocacion"
    && !c.some(x=>x.origen==="revocacion" && x.extra && String(x.extra.revoca)===String(s.id) && x.estado!=="rechazada"));
}
// Revocar VARIAS de un lote a la vez: se eligen tocando las fichas y se anulan juntas,
// con un mismo motivo y un mismo lote de revocación (una tarjeta, un comunicado).
function abrirRevocarLote(lote){
  const items=_revocables(lote); if(!items.length) return;
  const s0=items[0]||{}, art=(s0.articulo&&s0.articulo!=="libre")?` · Art. ${_escDoc(s0.articulo)}`:"";
  window._rvLote=lote; window._rvSel=new Set(items.map(s=>String(s.id)));
  $("modal-body").innerHTML=`
    <div class="mtit">↩️ Revocar sanciones del paquete</div>
    <div class="msub">Elige a quién se le retira. Las que marques se anulan <b>juntas</b>: una sola tarjeta en la cola y <b>un único comunicado</b>. Entran como <b>pendientes</b> y las confirmas tú.</div>
    <div class="tarjeta" style="margin-bottom:12px">
      <div class="sclote-m">${_escDoc(s0.motivo||"(sin motivo)")}${art}</div>
    </div>
    <div class="cform">
      <label>A quién se le retira <span style="color:var(--ink3)">(toca para marcar)</span></label>
      <div class="cchips" id="rv-chips"></div>
      <div class="scmsbar"><button type="button" onclick="_rvTodos(true)">Todos</button><button type="button" onclick="_rvTodos(false)">Ninguno</button><span id="rv-cuenta"></span></div>
      <label>Motivo de la revocación<select id="rv-tipo" onchange="_rvPrev()">
        <option value="Apelación aceptada: presentó una justificación válida">Apelación aceptada · presentó justificación</option>
        <option value="Error en la sanción: no procedía">Error · la sanción no procedía</option>

// fecha de referencia cercana (límite de respuesta / creado / generado) exigiendo que
// coincidan DÍA-DEL-MES y DÍA-DE-SEMANA: ese par es único dentro de ±45 días, mucho más

      else { _gate_('<img src="insignia.png" alt="Solaris" style="width:104px;height:auto;margin-bottom:10px"><img src="banner-solaris.png" alt="UVigo Aerotech Solaris" style="width:min(200px,52vw);height:auto"><div style="color:#ffb3b0;max-width:320px">No se pudo cargar el inicio de sesión. Revisa tu conexión y vuelve a intentarlo.</div><button onclick="location.reload()" style="border:1px solid #444;background:transparent;color:#eaeaea;border-radius:10px;padding:10px 16px;cursor:pointer">Recargar</button>'); }   // build sin datos: sin login no hay nada que enseñar, mantener el gate
      return;
    }
    setTimeout(function(){_esperarGis_(n-1);}, 150);
  })(40);
}

  if(_tokGuardado){ _onCredencial_({credential:_tokGuardado}, true); }   // login instantáneo; si caducó, cae a Google sin ruido
