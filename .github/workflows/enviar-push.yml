# ⚠️ Este archivo va en el repo elegido como `.github/workflows/enviar-push.yml`
# (recomendado: el repo `solaris-panel`, o uno dedicado). Corre el emisor cada 5 min.
# Requiere que la carpeta `emisor-push/` esté en ese mismo repo, y estos SECRETS del repo:
#   APP_PUSH_URL, PUSH_KEY, VAPID_PUBLIC, VAPID_PRIVATE, VAPID_SUBJECT
name: Enviar notificaciones push

on:
  schedule:
    - cron: "*/5 * * * *"   # cada 5 minutos (latencia de sobra para avisos)
  workflow_dispatch: {}      # permite lanzarlo a mano para probar

concurrency:
  group: enviar-push
  cancel-in-progress: false

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Instalar dependencias
        working-directory: emisor-push
        run: npm install --no-audit --no-fund
      - name: Enviar cola de notificaciones
        working-directory: emisor-push
        env:
          APP_PUSH_URL: ${{ secrets.APP_PUSH_URL }}
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
          VAPID_PUBLIC: ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: node enviar_push.js
